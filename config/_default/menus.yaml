# Navigation Links
#   To link a page section, specify the URL as a hash `/#` followed by the `id` of the section.
#   The `weight` parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /#top
    weight: 10
  - name: Features
    url: /#features
    weight: 20
  - name: Solutions
    url: /#solutions
    weight: 30
  - name: Changelog
    url: /changelog/
    weight: 35
    params:
      draft: true
  - name: Resources
    weight: 40
    hasChildren: true
    params:
      draft: true
  - parent: Resources
    name: Blog
    url: blog/
    params:
      draft: true

# Footer links (4-column layout)
#   Top-level items become column headings, children become links.
footer: []
